<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Reconhecimento de Pessoas com Mascara</title>
    <style>
      :root {
        color-scheme: light;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 24px;
        font-family:
          Inter,
          system-ui,
          -apple-system,
          "Segoe UI",
          Roboto,
          sans-serif;
        background: radial-gradient(
          circle at top,
          #dff5ff,
          #f6fbff 45%,
          #eef2ff 100%
        );
        color: #1f2937;
      }

      .app {
        width: min(100%, 520px);
        background: rgba(255, 255, 255, 0.9);
        border: 1px solid #dbeafe;
        border-radius: 18px;
        padding: 24px;
        box-shadow: 0 18px 50px rgba(30, 41, 59, 0.12);
      }

      h1 {
        margin: 0;
        text-align: center;
        font-size: 1.5rem;
      }

      p {
        margin: 8px 0 18px;
        text-align: center;
        color: #475569;
      }

      button {
        display: block;
        width: 100%;
        border: 0;
        border-radius: 12px;
        padding: 12px 16px;
        font-size: 1rem;
        font-weight: 600;
        color: #ffffff;
        background: linear-gradient(135deg, #2563eb, #7c3aed);
        cursor: pointer;
        transition:
          transform 0.2s ease,
          box-shadow 0.2s ease;
      }

      button:hover {
        transform: translateY(-1px);
        box-shadow: 0 10px 20px rgba(37, 99, 235, 0.28);
      }

      #webcam-container {
        margin-top: 20px;
        display: flex;
        justify-content: center;
      }

      #webcam-container canvas {
        border-radius: 14px;
        border: 2px solid #bfdbfe;
        box-shadow: 0 10px 24px rgba(15, 23, 42, 0.12);
      }

      #label-container {
        margin-top: 16px;
        display: grid;
        gap: 8px;
      }

      #label-container div {
        background: #f8fafc;
        border: 1px solid #e2e8f0;
        border-radius: 10px;
        padding: 10px 12px;
        font-weight: 500;
      }
    </style>
  </head>
  <body>
    <main class="app">
      <h1>Reconhecimento de Pessoas com Máscara</h1>
      <p>Inicie a câmera para analisar em tempo real.</p>
      <button type="button" onclick="init()">Iniciar</button>
      <div id="webcam-container"></div>
      <div id="label-container"></div>
    </main>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@latest/dist/tf.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@teachablemachine/image@latest/dist/teachablemachine-image.min.js"></script>
    <script src="script.js"></script>
  </body>
</html>
